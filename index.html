<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI Infrastructure DDS - Login to your account">

<title>AI Infrastructure DDS – Ultimate Cost & Management System</title>

<link rel="stylesheet" href="style.css?v=3">

<script>
// Apply theme BEFORE page renders to prevent flash
const theme = localStorage.getItem('theme') || 'dark';
if (theme === 'light') {
  document.documentElement.style.opacity = '0';
  document.body.classList.add('light');
  window.addEventListener('DOMContentLoaded', () => {
    document.documentElement.style.opacity = '1';
  });
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div id="offlineBanner" class="offline-banner" role="alert" aria-live="polite">
⚠ You are offline. Cached mode active.
</div>

<div class="auth-wrapper">

<div class="top-controls">

</div>

<div class="auth-card">

<h1>AI Infrastructure DDS</h1>
<h3>Ultimate Cost & Management System</h3>

<div class="tab-buttons" role="tablist">
<button class="tab active" onclick="showTab('login')" role="tab" aria-selected="true" aria-controls="loginTab">
Login
</button>

<button class="tab" onclick="showTab('register')" role="tab" aria-selected="false" aria-controls="registerTab">
Register
</button>
</div>

<!-- LOGIN -->

<div id="loginTab" role="tabpanel" aria-labelledby="login-tab">

<form id="loginForm">

<div class="form-group">
<label>Email</label>
<input
type="email"
id="loginEmail"
required
placeholder="Enter Email">
</div>

<div class="form-group">
<label>Password</label>

<div class="password-box">
<input
type="password"
id="loginPassword"
required
placeholder="Enter Password">

<button
type="button"
onclick="togglePassword('loginPassword')">
👁
</button>
</div>
</div>

<div class="form-group">

<label>Role</label>

<select id="loginRole">

<option value="Admin">Admin</option>
<option value="Engineer">Engineer</option>
<option value="Inspector">Inspector</option>
<option value="Contractor">Contractor</option>

</select>

</div>

<div class="remember-box">

<input
type="checkbox"
id="rememberMe">

<label for="rememberMe">

Remember Me

</label>

</div>

<button class="btn-primary">
Login
</button>

</form>

<p class="demo-info">

Default Admin:<br>

admin@dds.com<br>

Password: admin123

</p>

</div>

<!-- REGISTER -->

<div id="registerTab" style="display:none">

<form id="registerForm">

<div class="form-group">
<label>Full Name</label>
<input
type="text"
id="regName"
required>
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
id="regEmail"
required>
</div>

<div class="form-group">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="regPassword"
required>

<button
type="button"
onclick="togglePassword('regPassword')">
👁
</button>

</div>

</div>

<div class="form-group">

<label>Confirm Password</label>

<input
type="password"
id="regConfirm"
required>

</div>

<div class="form-group">

<label>Role</label>

<select id="regRole">

<option value="Engineer">
Engineer
</option>

<option value="Inspector">
Inspector
</option>

<option value="Contractor">
Contractor
</option>

</select>

</div>

<button class="btn-primary">
Create Account
</button>

</form>

</div>

</div>

</div>

<script>

// Create default admin

(function(){

let users =
JSON.parse(localStorage.getItem("users") || "[]");

if(!users.find(u=>u.email==="admin@dds.com")){

users.push({

name:"System Administrator",
email:"admin@dds.com",
password:"admin123",
role:"Admin"

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

}

})();

// Tabs

function showTab(tab){

document
.getElementById("loginTab")
.style.display =
tab==="login" ? "block" : "none";

document
.getElementById("registerTab")
.style.display =
tab==="register" ? "block" : "none";

document
.querySelectorAll(".tab")
.forEach(x=>x.classList.remove("active"));

event.target.classList.add("active");

}

// Password toggle

function togglePassword(id){

let input=document.getElementById(id);

input.type =
input.type==="password"
? "text"
: "password";

}

// Register

document
.getElementById("registerForm")
.addEventListener("submit",e=>{

e.preventDefault();

const name =
document.getElementById("regName").value;

const email =
document.getElementById("regEmail").value;

const pass =
document.getElementById("regPassword").value;

const confirm =
document.getElementById("regConfirm").value;

const role =
document.getElementById("regRole").value;

if(pass!==confirm){

alert("Passwords do not match");

return;

}

let users =
JSON.parse(
localStorage.getItem("users")
|| "[]"
);

if(users.find(x=>x.email===email)){

alert("Email already exists");

return;

}

users.push({

name,
email,
password:pass,
role,
createdAt:new Date().toISOString()

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

alert("Registration Successful");

showTab("login");

});

// Login

document
.getElementById("loginForm")
.addEventListener("submit",e=>{

e.preventDefault();

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

let users =
JSON.parse(
localStorage.getItem("users")
|| "[]"
);

const user =
users.find(
u =>
u.email===email &&
u.password===password
);

if(!user){

alert("Invalid Credentials");

return;

}

localStorage.setItem(
"auth",
JSON.stringify(user)
);

window.location =
"dashboard.html";

});

// Theme

const btn =
document.getElementById("themeToggle");

btn.onclick=()=>{

document.body.classList.toggle("dark");

localStorage.setItem(
"theme",
document.body.classList.contains("dark")
? "dark"
: "light"
);

};

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

// Offline Banner

function updateOnline(){

const banner =
document.getElementById("offlineBanner");

banner.style.display =
navigator.onLine
? "none"
: "block";

}

window.addEventListener("online",updateOnline);
window.addEventListener("offline",updateOnline);

updateOnline();

// Service Worker

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("sw.js");

}

</script>

</body>
</html>
